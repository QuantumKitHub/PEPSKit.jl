# Non-uniform spaces across the unit cell. Each entry may use either a scalar
# string (broadcast across the unit cell) or a 2D array of strings (per-site).

# Mixed virtual bond dimensions across columns; environment uniform.
[[NonUniform]]
unitcell = [2, 2]
Pspaces = "в„‚^2"
Nspaces = [["в„‚^2", "в„‚^3"], ["в„‚^2", "в„‚^3"]]
Espaces = [["в„‚^2", "в„‚^3"], ["в„‚^2", "в„‚^3"]]
chi_north = "в„‚^8"
chi_east = "в„‚^8"
chi_south = "в„‚^8"
chi_west = "в„‚^8"

