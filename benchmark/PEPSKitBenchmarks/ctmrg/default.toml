[[Trivial]]
unitcell = [2, 2]
Pspace = "в„‚^2"
Dspace = "в„‚^2"
chispace = "в„‚^8"

# Non-uniform spaces across the unit cell. Each entry mixes scalar (broadcast)
# and matrix (per-site) fields. See ctmrg_iteration_benchmarks.jl for the
# fallback resolution rules.

# Mixed virtual bond dimensions across columns; environment uniform.
[[NonUniform]]
unitcell = [2, 2]
Pspace = "в„‚^2"
Nspaces = [["в„‚^2", "в„‚^3"], ["в„‚^2", "в„‚^3"]]
chispace = "в„‚^8"

# Anisotropic environment: north/south chi differs from east/west chi.
[[NonUniform]]
unitcell = [2, 2]
Pspace = "в„‚^2"
Dspace = "в„‚^2"
chi_north = "в„‚^8"
chi_east = "в„‚^12"

# Fully heterogeneous 2x1: row-varying D and environment.
[[NonUniform]]
unitcell = [2, 1]
Pspace = "в„‚^2"
Nspaces = [["в„‚^2"], ["в„‚^3"]]
Espaces = [["в„‚^2"], ["в„‚^3"]]
chi_north = [["в„‚^8"], ["в„‚^12"]]
